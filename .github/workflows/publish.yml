name: Publish npm package

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Validate, test, publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q jq bats parallel

      - name: Validate release tag
        run: |
          semver_re='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*)|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*)(\.((0|[1-9][0-9]*)|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*))*)?$'
          if ! [[ "$GITHUB_REF_NAME" =~ $semver_re ]]; then
            echo "Refusing to publish invalid release tag: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          package_version="$(jq -r .version package.json)"
          if [[ "$GITHUB_REF_NAME" != "$package_version" ]]; then
            echo "Refusing to publish tag $GITHUB_REF_NAME as package version $package_version" >&2
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: npm

      - name: Set up npm trusted publishing
        run: npm install --global npm@11.6.2

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: make typecheck

      - name: Validate
        run: make validate

      - name: Test
        run: make test

      - name: Release check
        run: make release-check

      - name: Select npm dist-tag
        run: |
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            echo 'NPM_DIST_TAG=next' >> "$GITHUB_ENV"
          else
            echo 'NPM_DIST_TAG=latest' >> "$GITHUB_ENV"
          fi

      - name: Publish
        run: npm publish --provenance --tag "$NPM_DIST_TAG"
