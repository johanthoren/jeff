name: CI

on:
  push:
    branches: [main, pi-shell]
  pull_request:
    branches: [main, pi-shell]

permissions:
  contents: read

jobs:
  ci:
    name: Validate, test, release-check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q jq bats parallel

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Typecheck
        run: make typecheck

      - name: Validate
        run: make validate

      - name: Test
        run: make test

      - name: Release check
        run: make release-check
