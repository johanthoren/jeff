name: CI

on:
  push:
    branches: [main, pi-shell]
  pull_request:
    branches: [main, pi-shell]

permissions:
  contents: read

jobs:
  ci:
    name: Validate, test, release-check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q jq bats parallel

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: npm

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: make typecheck

      - name: Validate
        run: make validate

      - name: Test
        run: make test

      - name: Release check
        run: make release-check
